<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <title>Document</title>
    <style>
        section {
            width: 100vw;
            height: 100vh;
            padding: 2em;
            box-sizing: border-box;

        }

        section:nth-child(odd){
            background-color: lightgoldenrodyellow;

        }

        section:nth-child(3){
            align-items: flex-start;
        }

        section:nth-child(4){
            align-items: flex-end;
        }


        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1{
            font-size: 5em;
            align-items: flex-start;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

       
    </style>
</head>
<body>
    <main>
       
            <section class="container">
                <h1 data-aos="zoom-in"
                    data-aos-duration="300"
                    data-aos-delay="3000"
                    data-aos-easing="ease"> FIGHT!</h1>
            </section>
            <section class="container">
                <img src="story1.png" data-aos="zoom-in-up"
                    data-aos-delay="500"
                    data-aos-duration="2000"
                    data-aos-easing="ease">
            </section>
            <section class="container">
                <img src="story2.png" data-aos="fade-right" 
                    data-aos-delay="500"
                    data-aos-duration="500">
            </section>
            <section class="container">
                <img src="story3.png" data-aos="fade-left"
                    data-aos-delay="500"
                    data-aos-duration="500">
            </section>
             <section class="container">
                <img src="story4.png" data-aos="zoom-out-down"
                    data-aos-duration="2000"
                    data-aos-delay="500"
                    data-aos-easing="ease">
            </section>
             <section class="container">
                <img src="story5.png" data-aos="fade-down"
                    data-aos-duration="2000"
                    data-aos-delay="1000"
                    data-aos-easing="ease">
            </section>
            <section class="container">
                <img src="story6.png" data-aos="fade-up"
                    data-aos-duration="2000"
                    data-aos-delay="1000"
                    data-aos-easing="ease">
            </section>
        
    </main>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
